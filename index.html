<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Website Statistics — Grain</title>
  <style>
    @font-face { font-family:'Kapra Neue'; font-weight:900; font-display:swap; src:url('fonts/KapraNeue-BlackExpanded.otf') format('opentype'); }
    @font-face { font-family:'Funkis A'; font-weight:300; font-display:swap; src:url('fonts/FunkisA-Light.woff2') format('woff2'), url('fonts/FunkisA-Light.woff') format('woff'); }
    @font-face { font-family:'Funkis A'; font-weight:400; font-display:swap; src:url('fonts/FunkisA-Regular.woff2') format('woff2'), url('fonts/FunkisA-Regular.woff') format('woff'); }
    @font-face { font-family:'Funkis A'; font-weight:500; font-display:swap; src:url('fonts/FunkisA-Medium.woff2') format('woff2'), url('fonts/FunkisA-Medium.woff') format('woff'); }
    @font-face { font-family:'Funkis A'; font-weight:700; font-display:swap; src:url('fonts/FunkisA-Bold.woff2') format('woff2'), url('fonts/FunkisA-Bold.woff') format('woff'); }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --off-white: #FFFCF7;
      --cream: #FBF7F3;
      --filled-1: #F6F2EC;
      --filled-2: #EAE6E1;
      --off-black: #1A1A1A;
      --bg: #FFFCF7;
      --card-bg: #FBF7F3;
      --yellow: #FECC07;
      --yellow-text: #FFB800;
      --custard: #FFF6DD;
      --grey: #9A9691;
      --grey-light: #E0DCD7;
      --faded: #9A9691;
      --border: #EAE6E1;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Funkis A', system-ui, sans-serif;
      background: var(--bg);
      color: var(--off-black);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── LOGOMARK ─── */
    .logomark { width: 22px; height: 22px; display: block; }

    /* ─── NAV / GLOBAL BAR ─── */
    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      gap: 16px;
      position: relative;
      min-height: 60px;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      text-decoration: none;
      color: var(--off-black);
      flex-shrink: 0;
    }

    .nav-add {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 12px 20px 12px 18px;
      background: var(--yellow);
      border: none;
      border-radius: 10px;
      font-family: 'Funkis A', sans-serif;
      font-weight: 700;
      font-size: 0.875rem;
      color: var(--off-black);
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .nav-add:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(254,204,7,0.4);
    }

    .nav-add svg { width: 14px; height: 14px; }

    .nav-add-wrap { position: relative; }

    .nav-add-tooltip {
      position: absolute;
      bottom: calc(100% + 8px);
      right: 0;
      background: #1A1A1A;
      color: #FFFCF7;
      font-family: 'Funkis A', sans-serif;
      font-size: 12px;
      font-weight: 400;
      line-height: 1.5;
      padding: 8px 12px;
      border-radius: 8px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.15s, transform 0.15s;
    }

    .nav-add-wrap:hover .nav-add-tooltip {
      opacity: 1;
      transform: translateY(0);
    }

    .header-btn-outline {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 12px 20px 12px 18px;
      background: var(--bg);
      border: 1px solid var(--grey-light);
      border-radius: 10px;
      font-family: 'Funkis A', sans-serif;
      font-weight: 600;
      font-size: 14px;
      color: var(--off-black);
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .header-btn-outline:hover { border-color: var(--grey); }
    .header-btn-outline svg { width: 14px; height: 14px; }

    /* ─── DATE PICKER ─── */
    .dp-wrap { position: relative; }
    .dp-popover {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      z-index: 50;
      background: #FBF7F3;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px;
      width: 300px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      opacity: 0;
      pointer-events: none;
      transform: translateY(-4px);
      transition: opacity 0.2s, transform 0.2s;
    }
    .dp-popover.open { opacity: 1; pointer-events: auto; transform: translateY(0); }
    .dp-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .dp-month { font-family: 'Funkis A', sans-serif; font-weight: 700; font-size: 14px; }
    .dp-nav-btn { background: none; border: none; cursor: pointer; color: var(--text); padding: 4px; font-size: 1rem; border-radius: 4px; transition: background 0.15s; }
    .dp-nav-btn:hover { background: var(--border); }
    .dp-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; }
    .dp-dow { font-size: 11px; font-weight: 600; color: var(--text); padding: 6px 0; }
    .dp-cell { font-size: 13px; border-radius: 50%; border: none; background: none; cursor: pointer; font-family: 'Funkis A', sans-serif; color: var(--text); transition: background 0.15s; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; }
    .dp-cell:hover { background: var(--border); }
    .dp-cell.today { background: var(--border); font-weight: 700; }
    .dp-cell.selected { background: var(--yellow); font-weight: 700; }
    .dp-cell.other { color: var(--grey-light); }
    .dp-cell.future { color: var(--grey-light); cursor: default; }
    .dp-cell.future:hover { background: none; }
    .dp-foot { display: flex; justify-content: space-between; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
    .dp-clear { background: none; border: none; font-family: 'Funkis A', sans-serif; font-size: 13px; color: var(--text-muted); cursor: pointer; }
    .dp-clear:hover { color: var(--text); }

    /* ─── MODAL ─── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      background: #FFFCF6;
      border-radius: 10px;
      padding: 24px;
      width: min(726px, 90vw);
      display: flex;
      flex-direction: column;
      gap: 24px;
      transform: translateY(12px) scale(0.97);
      transition: transform 0.3s cubic-bezier(0.22,0.61,0.36,1);
    }

    .modal-overlay.open .modal {
      transform: translateY(0) scale(1);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .modal-title {
      font-family: 'Funkis A', sans-serif;
      font-weight: 600;
      font-size: 18px;
      color: #1A1A1A;
    }

    .modal-close {
      width: 24px;
      height: 24px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--grey);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s;
    }

    .modal-close:hover { color: #1A1A1A; }
    .modal-close svg { width: 14px; height: 14px; }

    .modal-body {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .modal-desc {
      font-size: 14px;
      color: var(--grey);
      line-height: 1.5;
    }

    .modal-field {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .modal-label {
      font-family: 'Funkis A', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--grey);
    }

    .modal-input {
      padding: 12px 18px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-family: 'Funkis A', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      background: #FFFCF7;
    }

    .modal-input:focus {
      border-color: var(--yellow);
    }

    .modal-input::placeholder {
      color: var(--grey-light);
    }

    .modal-footer {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      padding-top: 18px;
      border-top: 1px solid var(--border);
    }

    .modal-cancel {
      padding: 12px 18px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #FFFCF7;
      font-family: 'Funkis A', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #1A1A1A;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .modal-cancel:hover { border-color: var(--grey); }

    .modal-submit {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: var(--yellow);
      font-family: 'Funkis A', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #1A1A1A;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .modal-submit:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(254,204,7,0.4);
    }

    .modal-date-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .modal-date-input {
      flex: 1;
      position: relative;
    }

    .modal-date-input .modal-input {
      width: 100%;
      padding-right: 40px;
      cursor: pointer;
    }

    .modal-date-icon {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: var(--grey);
      pointer-events: none;
    }

    .modal-date-to {
      font-size: 14px;
      color: var(--grey);
      flex-shrink: 0;
    }

    /* Modal date picker popover */
    .modal-dp {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      z-index: 60;
      background: #FBF7F3;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px;
      width: 280px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      opacity: 0;
      pointer-events: none;
      transform: translateY(-4px);
      transition: opacity 0.2s, transform 0.2s;
    }
    .modal-dp.open { opacity: 1; pointer-events: auto; transform: translateY(0); }

    .modal-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* ─── PAGE HEADER ─── */
    .page-header {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 24px 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .header-title-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-title {
      font-family: 'Kapra Neue', 'Funkis A', sans-serif;
      font-weight: 900;
      font-size: 24px;
      text-transform: uppercase;
      line-height: 1.5;
      color: var(--off-black);
    }

    .header-count {
      background: var(--border);
      border-radius: 5px;
      padding: 3px 6px;
      font-family: 'Funkis A', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: var(--grey);
      line-height: 1.25;
    }

    .header-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .header-tabs {
      display: flex;
      align-items: center;
    }

    .header-tab {
      padding: 12px 18px;
      border-radius: 10px;
      border: none;
      background: none;
      font-family: 'Funkis A', sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: var(--grey);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .header-tab.active {
      background: var(--filled-1, #F6F2EC);
      font-weight: 600;
      color: var(--off-black);
    }

    .header-tab:hover:not(.active) { color: var(--off-black); }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ─── CAMPAIGN GRID ─── */
    .campaigns {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 24px 48px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
    }

    .campaign-card {
      position: relative;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      text-decoration: none;
      color: var(--off-black);
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      transition: transform 0.35s cubic-bezier(0.22,0.61,0.36,1),
                  border-color 0.35s ease,
                  box-shadow 0.35s ease;
      opacity: 0;
      transform: translateY(20px);
      cursor: pointer;
    }

    .campaign-card:hover {
      transform: translateY(-4px);
      border-color: var(--yellow);
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
    }

    .campaign-card.visible {
      animation: cardIn 0.55s cubic-bezier(0.22,0.61,0.36,1) forwards;
    }

    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      display: flex;
      flex-direction: column;
    }

    .card-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.65rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 4px 10px;
      border-radius: 100px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .card-status.live {
      background: rgba(42,143,75,0.1);
      color: #1d7a3a;
    }

    .card-status.live::before {
      content: '';
      width: 6px;
      height: 6px;
      background: #2a8f4b;
      border-radius: 50%;
      animation: pulse 2s ease infinite;
    }

    .card-status.ended {
      background: rgba(0,0,0,0.04);
      color: var(--grey);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .card-name {
      font-family: 'Kapra Neue', 'Funkis A', sans-serif;
      font-weight: 900;
      font-size: 1.35rem;
      text-transform: uppercase;
      line-height: 1.15;
      letter-spacing: 0.01em;
    }

    .card-date-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-top: 4px;
    }

    .card-date {
      font-size: 0.75rem;
      color: var(--grey);
    }

    .card-desc {
      font-size: 0.85rem;
      color: var(--grey);
      line-height: 1.55;
    }

    .card-spark {
      height: 32px;
      width: 100%;
      margin-top: auto;
    }

    .card-spark polyline {
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .card-kpis {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      margin-top: auto;
    }

    .card-kpi { display: flex; flex-direction: column; gap: 2px; }

    .card-kpi-value {
      font-family: 'Kapra Neue', 'Funkis A', sans-serif;
      font-weight: 900;
      font-size: 1.25rem;
      line-height: 1.1;
    }

    .card-delete {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--grey);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
      z-index: 2;
    }

    .card-delete:hover {
      background: #FFECEC;
      color: #FF2E2E;
    }

    .card-delete svg { width: 16px; height: 16px; }

    /* ─── DELETE DIALOG ─── */
    .delete-overlay {
      position: fixed;
      inset: 0;
      z-index: 300;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .delete-overlay.open { opacity: 1; pointer-events: auto; }

    .delete-dialog {
      background: var(--bg);
      border-radius: 10px;
      padding: 24px;
      width: 404px;
      max-width: 90vw;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 24px;
      transform: translateY(8px) scale(0.97);
      transition: transform 0.25s cubic-bezier(0.22,0.61,0.36,1);
    }

    .delete-overlay.open .delete-dialog { transform: translateY(0) scale(1); }

    .delete-body {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 100%;
    }

    .delete-icon {
      width: 48px;
      height: 48px;
      border-radius: 24px;
      background: #FFECEC;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .delete-icon svg { width: 24px; height: 24px; color: #FF2E2E; }

    .delete-title {
      font-family: 'Funkis A', sans-serif;
      font-weight: 600;
      font-size: 18px;
      color: var(--off-black);
      text-align: center;
    }

    .delete-desc {
      font-family: 'Funkis A', sans-serif;
      font-size: 14px;
      color: var(--off-black);
      text-align: center;
      max-width: 291px;
      line-height: 1.5;
    }

    .delete-actions {
      display: flex;
      gap: 12px;
      width: 100%;
    }

    .delete-actions button {
      flex: 1;
      padding: 12px 24px;
      border-radius: 10px;
      font-family: 'Funkis A', sans-serif;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .delete-actions button:hover { opacity: 0.85; }

    .delete-cancel-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--off-black);
    }

    .delete-confirm-btn {
      background: #FFECEC;
      border: none;
      color: #FF2E2E;
    }

    /* ─── GLOBAL BAR (inline in nav) ─── */
    .global-bar-count {
      font-family: 'Funkis A', sans-serif;
      font-size: 14px;
      color: var(--grey);
      white-space: nowrap;
    }

    .global-bar-search {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 12px;
      background: #F6F2EC;
      border-radius: 10px;
      padding: 12px 18px;
      width: 650px;
      max-width: 45%;
    }

    .global-bar-search svg {
      width: 16px;
      height: 16px;
      color: var(--grey);
      flex-shrink: 0;
    }

    .global-bar-search input {
      border: none;
      background: none;
      outline: none;
      font-family: 'Funkis A', sans-serif;
      font-size: 14px;
      color: var(--off-black);
      width: 100%;
    }

    .global-bar-search input::placeholder {
      color: var(--grey);
    }

    .search-shortcut {
      display: flex;
      align-items: center;
      gap: 3px;
      margin-left: auto;
      flex-shrink: 0;
    }

    .search-kbd {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      height: 22px;
      padding: 0 5px;
      background: #FFFCF7;
      border: 1px solid var(--grey-line);
      border-radius: 5px;
      font-family: 'Funkis A', sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: var(--grey);
      line-height: 1;
    }

    .card-kpi-label {
      font-size: 14px;
      font-weight: 500;
      text-transform: none;
      letter-spacing: 0.02em;
      color: var(--faded);
      white-space: nowrap;
    }


    /* ─── MOBILE ─── */
    @media (max-width: 640px) {
      .nav { padding: 12px 24px; }
      .global-bar-search { display: none; }
      .page-header { padding: 24px 24px 0; }
      .header-toolbar { gap: 12px; }
      .header-tab { padding: 10px 14px; font-size: 13px; }
      .header-btn-outline { padding: 10px 14px; font-size: 13px; white-space: nowrap; }
      .nav-add { padding: 10px 14px; font-size: 13px; white-space: nowrap; }
      .campaigns { grid-template-columns: 1fr; padding: 24px 24px 48px; }
      .modal { width: min(400px, calc(100vw - 48px)); padding: 24px; }
    }
  </style>
</head>
<body>
<script src="auth.js"></script>

  <nav class="nav">
    <a class="nav-brand" href="/">

  <header class="page-header">
    <div class="header-title-row">
      <h1 class="header-title">Web Statistics</h1>
      <span class="header-count" id="campaignCount">3</span>
    </div>
    <div class="header-toolbar">
      <div class="header-tabs">
        <button class="header-tab active" data-filter="all">All</button>
        <button class="header-tab" data-filter="live">Live</button>
        <button class="header-tab" data-filter="ended">Ended</button>
      </div>
      <div class="header-actions">
        <div class="dp-wrap">
          <button class="header-btn-outline" id="dpBtn">
            <svg viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4.78.75V4.24M10.05.75V4.24M.82 6.51H14"/><rect x=".75" y="2.32" width="13.32" height="11.68" rx="2.25"/></svg>
            Pick a date

              <button class="dp-nav-btn" id="dpPrev">&#8249;</button>

  <section class="campaigns" id="campaigns"></section>

  <!-- Delete Dialog -->
  <div class="delete-overlay" id="deleteOverlay">
    <div class="delete-dialog">
      <div class="delete-body">
        <div class="delete-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6M10 11v6M14 11v6"/></svg>
        </div>
        <div class="delete-title">Delete web statistics?</div>
        <div class="delete-desc">All the data will be gone for good. You won't be able to get it back.</div>
      </div>
      <div class="delete-actions">
        <button class="delete-cancel-btn" id="deleteCancel">Cancel</button>
        <button class="delete-confirm-btn" id="deleteConfirm">Delete</button>

  <!-- Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">Add website</div>
        <button class="modal-close" id="modalClose">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 1l12 12M13 1L1 13"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="modal-field">
          <label class="modal-label">Website URL</label>
          <input class="modal-input" id="modalUrl" type="url" placeholder="https://example.grain.com.sg" autocomplete="off" />
        </div>
        <div class="modal-field">
          <label class="modal-label">Campaign name</label>
          <input class="modal-input" id="modalName" type="text" placeholder="e.g. Summer Menu Launch" autocomplete="off" />
        </div>
        <div class="modal-field">
          <label class="modal-label">Campaign period</label>
          <div class="modal-date-row">
            <div class="modal-date-input">
              <input class="modal-input" id="modalStart" type="text" placeholder="Select date" readonly />
              <svg class="modal-date-icon" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4.78.75V4.24M10.05.75V4.24M.82 6.51H14"/><rect x=".75" y="2.32" width="13.32" height="11.68" rx="2.25"/></svg>
              <input type="hidden" id="modalStartVal" />
            </div>
            <span class="modal-date-to">&mdash;</span>
            <div class="modal-date-input">
              <input class="modal-input" id="modalEnd" type="text" placeholder="Select date" readonly />
              <svg class="modal-date-icon" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4.78.75V4.24M10.05.75V4.24M.82 6.51H14"/><rect x=".75" y="2.32" width="13.32" height="11.68" rx="2.25"/></svg>
              <input type="hidden" id="modalEndVal" />
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="modal-cancel" id="modalCancel">Cancel</button>
        <button class="modal-submit" id="modalSubmit" disabled>Generate Stats</button>
      </div>
    </div>
  </div>

  <script>
    const CAMPAIGNS = [
      {
        slug: 'missing-recipes',
        name: 'Missing Recipes',
        status: 'live',
        date: '14–27 Apr 2026',
        desc: 'Interactive recipe hunt with QR codes placed at Grain outlets. Users guess which recipe they found to unlock a reward.',
        kpis: { views: '4,827', matches: '1,664', codes: '893' },
        kpiLabels: { views: 'Views', matches: 'Matches', codes: 'Codes Copied' },
        spark: [12,18,15,22,28,35,31,38,34,29,36,42,48,52],
        sparkColor: '#fecc07',
      },
      {
        slug: 'flavour-personality',
        name: 'Flavour Personality',
        status: 'ended',
        date: '8 Jan – 28 Feb 2026',
        desc: 'Personality quiz matching users to their ideal Grain flavour profile. Shared on socials with custom result cards.',
        kpis: { views: '12,340', matches: '8,912', codes: '3,104' },
        kpiLabels: { views: 'Views', matches: 'Completed', codes: 'Shares' },
        spark: [45,52,60,58,72,68,75,80,74,65,55,48,40,35],
        sparkColor: '#9a9691',
      },
      {
        slug: 'site',
        url: 'https://occasions.grain.com.sg/whats-new-june-2026',
        name: "What's Cooking June",
        status: 'ended',
        date: '20 May – 30 Jun 2025',
        desc: 'Teaser campaign for the June menu launch. Users voted on dishes they wanted to see return.',
        kpis: { views: '7,650', matches: '5,230', codes: '1,890' },
        kpiLabels: { views: 'Views', matches: 'Votes', codes: 'Signups' },
        spark: [20,25,30,42,55,68,72,78,70,62,50,45,38,30],
        sparkColor: '#9a9691',
      },
    ];

    function sparkPath(data, w, h) {
      const max = Math.max(...data), min = Math.min(...data), range = max - min || 1;
      return data.map((v, i) => `${(i / (data.length - 1)) * w},${h - ((v - min) / range) * (h - 4) - 2}`).join(' ');
    }

    const grid = document.getElementById('campaigns');

    CAMPAIGNS.forEach((c, idx) => {
      const card = document.createElement('a');
      card.className = 'campaign-card';
      if (c.url) card.href = `site.html?url=${encodeURIComponent(c.url)}&name=${encodeURIComponent(c.name)}`;
      else card.href = `${c.slug}.html`;
      card.style.animationDelay = `${idx * 0.12}s`;

      const binSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6M10 11v6M14 11v6"/></svg>`;
      card.innerHTML = `
        <button class="card-delete" data-type="builtin" data-slug="${c.slug}" title="Delete">${binSvg}</button>
        <div class="card-header">
          <div class="card-name">${c.name}</div>
          <div class="card-date-row">
            <span class="card-date">${c.date}</span>
            <span class="card-status ${c.status}">${c.status === 'live' ? 'Live' : 'Ended'}</span>
          </div>
        </div>
        <div class="card-desc">${c.desc}</div>
        <svg class="card-spark" viewBox="0 0 200 32" preserveAspectRatio="none">
          <polyline points="${sparkPath(c.spark, 200, 32)}" stroke="${c.sparkColor}" />
        </svg>
        <div class="card-kpis">
          <div class="card-kpi"><span class="card-kpi-value">${c.kpis.views}</span><span class="card-kpi-label">${c.kpiLabels.views}</span></div>
          <div class="card-kpi"><span class="card-kpi-value">${c.kpis.matches}</span><span class="card-kpi-label">${c.kpiLabels.matches}</span></div>
          <div class="card-kpi"><span class="card-kpi-value">${c.kpis.codes}</span><span class="card-kpi-label">${c.kpiLabels.codes}</span></div>
        </div>
      `;
      grid.appendChild(card);
    });

    // ─── Render user-added campaigns from localStorage ───
    function renderCustomCampaigns() {
      const saved = JSON.parse(localStorage.getItem('customCampaigns') || '[]');
      saved.forEach((c, idx) => {
        const card = document.createElement('a');
        card.className = 'campaign-card';
        card.href = `site.html?url=${encodeURIComponent(c.url)}&name=${encodeURIComponent(c.name)}`;
        card.style.animationDelay = `${(CAMPAIGNS.length + idx) * 0.12}s`;

        const spark = Array.from({length:14}, () => Math.floor(Math.random()*40)+10);
        card.innerHTML = `
          <button class="card-delete" data-type="custom" data-idx="${idx}" title="Delete">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6M10 11v6M14 11v6"/></svg>
          </button>
          <div class="card-header">
            <div class="card-name">${c.name}</div>
            <div class="card-date-row">
              <span class="card-date">${c.date}</span>
              <span class="card-status live">Live</span>
            </div>
          </div>
          <div class="card-desc">${c.url}</div>
          <svg class="card-spark" viewBox="0 0 200 32" preserveAspectRatio="none">
            <polyline points="${sparkPath(spark, 200, 32)}" stroke="#fecc07" />
          </svg>
          <div class="card-kpis">
            <div class="card-kpi"><span class="card-kpi-value">—</span><span class="card-kpi-label">Views</span></div>
            <div class="card-kpi"><span class="card-kpi-value">—</span><span class="card-kpi-label">Sessions</span></div>
            <div class="card-kpi"><span class="card-kpi-value">—</span><span class="card-kpi-label">Conversions</span></div>
          </div>
        `;

        grid.appendChild(card);
      });
    }
    renderCustomCampaigns();

    // ─── Tab filtering ───
    document.querySelectorAll('.header-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.header-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const filter = tab.dataset.filter;
        document.querySelectorAll('.campaign-card').forEach(card => {
          if (filter === 'all') { card.style.display = ''; return; }
          const status = card.querySelector('.card-status');
          const isLive = status && status.classList.contains('live');
          card.style.display = (filter === 'live' && isLive) || (filter === 'ended' && !isLive) ? '' : 'none';
        });
      });
    });

    // Update count
    const totalCampaigns = CAMPAIGNS.length + JSON.parse(localStorage.getItem('customCampaigns') || '[]').length;
    document.getElementById('campaignCount').textContent = totalCampaigns;
    document.getElementById('totalCount').textContent = `Total websites (${totalCampaigns})`;

    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
    }, { threshold: 0.1 });
    document.querySelectorAll('.campaign-card').forEach(c => observer.observe(c));

    // ─── Modal logic ───
    const modal = document.getElementById('modal');
    const modalUrl = document.getElementById('modalUrl');
    const modalName = document.getElementById('modalName');
    const modalSubmit = document.getElementById('modalSubmit');

    // ─── Delete dialog logic ───
    let pendingDeleteCard = null;
    const deleteOverlay = document.getElementById('deleteOverlay');

    document.addEventListener('click', (e) => {
      const btn = e.target.closest('.card-delete');
      if (!btn) return;
      e.preventDefault();
      e.stopPropagation();
      pendingDeleteCard = btn.closest('.campaign-card');
      deleteOverlay.classList.add('open');
    });

    document.getElementById('deleteCancel').addEventListener('click', () => {
      deleteOverlay.classList.remove('open');
      pendingDeleteCard = null;
    });

    deleteOverlay.addEventListener('click', (e) => {
      if (e.target === deleteOverlay) { deleteOverlay.classList.remove('open'); pendingDeleteCard = null; }
    });

    document.getElementById('deleteConfirm').addEventListener('click', () => {
      if (!pendingDeleteCard) return;
      const btn = pendingDeleteCard.querySelector('.card-delete');
      if (btn.dataset.type === 'custom') {
        const idx = parseInt(btn.dataset.idx);
        const saved = JSON.parse(localStorage.getItem('customCampaigns') || '[]');
        saved.splice(idx, 1);
        localStorage.setItem('customCampaigns', JSON.stringify(saved));
      }
      pendingDeleteCard.remove();
      deleteOverlay.classList.remove('open');
      pendingDeleteCard = null;
      // Update count
      const remaining = document.querySelectorAll('.campaign-card').length;
      document.getElementById('campaignCount').textContent = remaining;
      document.getElementById('totalCount').textContent = `Total websites (${remaining})`;
    });

    // ─── Date picker ───
    (function(){
      const btn=document.getElementById('dpBtn');
      const pop=document.getElementById('dpPopover');
      if(!btn||!pop)return;
      let cur=new Date();const today=new Date();
      const grid=document.getElementById('dpGrid');
      const monthEl=document.getElementById('dpMonth');

      function render(){
        const y=cur.getFullYear(),m=cur.getMonth();
        monthEl.textContent=cur.toLocaleString('en-GB',{month:'long',year:'numeric'});
        grid.innerHTML='';
        ['S','M','T','W','T','F','S'].forEach(d=>{grid.innerHTML+=`<div class="dp-dow">${d}</div>`;});
        const first=new Date(y,m,1).getDay();
        const days=new Date(y,m+1,0).getDate();
        const prevDays=new Date(y,m,0).getDate();
        for(let i=first-1;i>=0;i--){grid.innerHTML+=`<button class="dp-cell other">${prevDays-i}</button>`;}
        for(let d=1;d<=days;d++){
          const isToday=d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear();
          const isFuture=new Date(y,m,d)>today;
          grid.innerHTML+=`<button class="dp-cell${isToday?' today':''}${isFuture?' future':''}" data-day="${d}">${d}</button>`;
        }
        const rem=(first+days)%7;if(rem>0)for(let d=1;d<=7-rem;d++){grid.innerHTML+=`<button class="dp-cell other">${d}</button>`;}
        grid.querySelectorAll('.dp-cell[data-day]').forEach(b=>{
          if(b.classList.contains('future'))return;
          b.addEventListener('click',()=>{
            grid.querySelectorAll('.dp-cell').forEach(c=>c.classList.remove('selected'));
            b.classList.add('selected');
          });
        });
      }

      btn.addEventListener('click',e=>{e.stopPropagation();pop.classList.toggle('open');render();});
      document.getElementById('dpPrev').addEventListener('click',e=>{e.stopPropagation();cur.setMonth(cur.getMonth()-1);render();});
      document.getElementById('dpNext').addEventListener('click',e=>{e.stopPropagation();cur.setMonth(cur.getMonth()+1);render();});
      document.getElementById('dpClear').addEventListener('click',e=>{e.stopPropagation();pop.classList.remove('open');});
      document.addEventListener('click',e=>{if(!pop.contains(e.target)&&e.target!==btn&&!btn.contains(e.target))pop.classList.remove('open');});
    })();

    document.getElementById('addWebsiteBtn').addEventListener('click', () => {
      modal.classList.add('open');
      setTimeout(() => modalUrl.focus(), 200);
    });

    function closeModal() {
      modal.classList.remove('open');
      modalUrl.value = '';
      modalName.value = '';
    }

    document.getElementById('modalCancel').addEventListener('click', closeModal);
    document.getElementById('modalClose').addEventListener('click', closeModal);

    modal.addEventListener('click', e => {
      if (e.target === modal) closeModal();
    });

    function validateModal() {
      modalSubmit.disabled = !(modalUrl.value.trim() && modalName.value.trim());
    }
    modalUrl.addEventListener('input', validateModal);
    modalName.addEventListener('input', validateModal);

    // ─── Modal date pickers ───
    function createModalDatePicker(inputEl, hiddenEl) {
      const wrap = inputEl.closest('.modal-date-input');
      const pop = document.createElement('div');
      pop.className = 'modal-dp';
      pop.innerHTML = `<div class="dp-head"><button class="dp-nav-btn mdp-prev">&#8249;</button><span class="dp-month mdp-month"></span><button class="dp-nav-btn mdp-next">&#8250;</button></div><div class="dp-grid mdp-grid"></div><div class="dp-foot"><button class="dp-clear mdp-clear">Clear</button></div>`;
      wrap.appendChild(pop);
      let cur = new Date();
      const today = new Date();
      const fmt = d => `${d.getDate()} ${d.toLocaleString('en-GB',{month:'short'})} ${d.getFullYear()}`;

      function render() {
        const y=cur.getFullYear(),m=cur.getMonth();
        pop.querySelector('.mdp-month').textContent=cur.toLocaleString('en-GB',{month:'long',year:'numeric'});
        const grid=pop.querySelector('.mdp-grid');
        grid.innerHTML='';
        ['S','M','T','W','T','F','S'].forEach(d=>{grid.innerHTML+=`<div class="dp-dow">${d}</div>`;});
        const first=new Date(y,m,1).getDay();
        const days=new Date(y,m+1,0).getDate();
        const prevDays=new Date(y,m,0).getDate();
        for(let i=first-1;i>=0;i--)grid.innerHTML+=`<button class="dp-cell other">${prevDays-i}</button>`;
        for(let d=1;d<=days;d++){
          const isToday=d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear();
          grid.innerHTML+=`<button class="dp-cell${isToday?' today':''}" data-day="${d}">${d}</button>`;
        }
        const rem=(first+days)%7;if(rem>0)for(let d=1;d<=7-rem;d++)grid.innerHTML+=`<button class="dp-cell other">${d}</button>`;
        grid.querySelectorAll('.dp-cell[data-day]').forEach(b=>{
          b.addEventListener('click',e=>{
            e.stopPropagation();
            const sel=new Date(y,m,+b.dataset.day);
            inputEl.value=fmt(sel);
            hiddenEl.value=sel.toISOString().split('T')[0];
            pop.classList.remove('open');
          });
        });
      }

      inputEl.addEventListener('click',e=>{e.stopPropagation();document.querySelectorAll('.modal-dp.open').forEach(p=>p.classList.remove('open'));pop.classList.toggle('open');render();});
      pop.querySelector('.mdp-prev').addEventListener('click',e=>{e.stopPropagation();cur.setMonth(cur.getMonth()-1);render();});
      pop.querySelector('.mdp-next').addEventListener('click',e=>{e.stopPropagation();cur.setMonth(cur.getMonth()+1);render();});
      pop.querySelector('.mdp-clear').addEventListener('click',e=>{e.stopPropagation();inputEl.value='';hiddenEl.value='';pop.classList.remove('open');});
      document.addEventListener('click',e=>{if(!pop.contains(e.target)&&e.target!==inputEl)pop.classList.remove('open');});
    }
    createModalDatePicker(document.getElementById('modalStart'), document.getElementById('modalStartVal'));
    createModalDatePicker(document.getElementById('modalEnd'), document.getElementById('modalEndVal'));

    modalSubmit.addEventListener('click', () => {
      const url = modalUrl.value.trim();
      const name = modalName.value.trim();
      const startVal = document.getElementById('modalStart').value;
      const endVal = document.getElementById('modalEnd').value;
      if (!url || !name) return;

      const date = (startVal && endVal) ? `${startVal} – ${endVal}` : new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});

      const saved = JSON.parse(localStorage.getItem('customCampaigns') || '[]');
      saved.push({ url, name, date });
      localStorage.setItem('customCampaigns', JSON.stringify(saved));

      modal.classList.remove('open');
      modalUrl.value = '';
      modalName.value = '';

      window.location.href = `site.html?url=${encodeURIComponent(url)}&name=${encodeURIComponent(name)}`;
    });
  </script>
</body>
</html>
