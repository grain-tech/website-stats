<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Site Stats — Grain</title>
  <style>
    @font-face { font-family:'Kapra Neue'; font-weight:900; font-display:swap; src:url('fonts/KapraNeue-BlackExpanded.otf') format('opentype'); }
    @font-face { font-family:'Funkis A'; font-weight:300; font-display:swap; src:url('fonts/FunkisA-Light.woff2') format('woff2'), url('fonts/FunkisA-Light.woff') format('woff'); }
    @font-face { font-family:'Funkis A'; font-weight:400; font-display:swap; src:url('fonts/FunkisA-Regular.woff2') format('woff2'), url('fonts/FunkisA-Regular.woff') format('woff'); }
    @font-face { font-family:'Funkis A'; font-weight:500; font-display:swap; src:url('fonts/FunkisA-Medium.woff2') format('woff2'), url('fonts/FunkisA-Medium.woff') format('woff'); }
    @font-face { font-family:'Funkis A'; font-weight:700; font-display:swap; src:url('fonts/FunkisA-Bold.woff2') format('woff2'), url('fonts/FunkisA-Bold.woff') format('woff'); }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    :root {
      --bg:#FFFCF7; --card:#FBF7F3; --border:#EAE6E1;
      --text:#1A1A1A; --text-secondary:#9A9691; --text-muted:#9A9691;
      --yellow:#FECC07; --yellow-bg:#FFF6DD;
      --green:#31AA88; --green-dark:#31AA88;
      --red:#FF2E2E; --orange:#F8D86F; --purple:#9A9691; --blue:#8CD9C3;
      --grey-line:#E0DCD7; --radius:8px;
    }

    body { font-family:'Funkis A',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased; }

    .nav { position:sticky; top:0; z-index:100; padding:12px 24px; display:flex; align-items:center; gap:8px; background:var(--bg); border-bottom:1px solid var(--border); }
    .nav-brand { text-decoration:none; display:flex; align-items:center; }
    .nav-sep { width:1px; height:16px; background:var(--border); }
    .nav-back { font-size:0.8rem; color:var(--text-muted); text-decoration:none; display:flex; align-items:center; gap:6px; transition:color 0.2s; }
    .nav-back:hover { color:var(--text); }
    .nav-back svg { width:14px; height:14px; }
    .nav-right { margin-left:auto; display:flex; align-items:center; gap:8px; }
    .nav-live { width:6px; height:6px; background:var(--green-dark); border-radius:50%; animation:pulse 2s ease infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .nav-updated { font-size:0.7rem; color:var(--text-muted); }

    .page-header { max-width:1100px; margin:0 auto; padding:1.75rem 2rem 0; display:flex; align-items:flex-start; justify-content:space-between; gap:1rem; flex-wrap:wrap; }
    .header-date { font-family:'Kapra Neue','Funkis A',sans-serif; font-weight:900; font-size:1.5rem; line-height:1.2; text-transform:uppercase; }
    .header-sub-row { display:flex; align-items:baseline; gap:12px; margin-top:2px; }
    .header-sub { font-size:0.8rem; color:var(--text-muted); }
    .header-url { font-size:0.75rem; color:var(--text-muted); margin-left:auto; }
    .header-url a { color:var(--text-secondary); text-decoration:underline; text-underline-offset:2px; }
    .header-actions { display:flex; gap:0.5rem; align-items:center; }
    .btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border:1px solid var(--border); border-radius:8px; background:var(--card); color:var(--text); font-family:'Funkis A',sans-serif; font-size:0.82rem; font-weight:500; cursor:pointer; text-decoration:none; transition:border-color 0.2s; }
    .btn:hover { border-color:var(--text-muted); }
    .btn svg { width:16px; height:16px; }

    .dashboard { max-width:1100px; margin:0 auto; padding:1.5rem 2rem 3rem; display:flex; flex-direction:column; gap:1rem; }

    .kpi-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:0.75rem; }
    .kpi-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:1.1rem 1rem; display:flex; flex-direction:column; gap:4px; opacity:0; transform:translateY(10px); }
    .kpi-card.highlight { background:var(--yellow-bg); border-color:#e8dbb0; }
    .kpi-card.visible { animation:fadeUp 0.45s ease forwards; }
    .kpi-label { font-size:14px; font-weight:500; color:var(--text-secondary); }
    .kpi-value { font-family:'Kapra Neue','Funkis A',sans-serif; font-weight:900; font-size:2rem; line-height:1; }
    .kpi-sub { font-size:0.68rem; font-weight:500; }
    .kpi-sub.up { color:var(--green-dark); }

    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

    .card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:1.25rem; opacity:0; transform:translateY(10px); }
    .card.visible { animation:fadeUp 0.45s ease forwards; }
    .card-title { font-family:'Kapra Neue','Funkis A',sans-serif; font-weight:900; font-size:0.85rem; text-transform:uppercase; letter-spacing:0.03em; margin-bottom:1rem; }
    .card-title-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem; }
    .chart-legend { display:flex; gap:1rem; font-size:0.7rem; color:var(--text-secondary); }
    .chart-legend-item { display:flex; align-items:center; gap:5px; }
    .chart-legend-dot { width:7px; height:7px; border-radius:50%; }

    .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    .grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:1rem; }
    .grid-2-1 { display:grid; grid-template-columns:2fr 1fr; gap:1rem; }
    @media(max-width:800px) { .grid-2,.grid-3,.grid-2-1{grid-template-columns:1fr;} }

    .lc-svg { width:100%; height:auto; }
    .lc-grid { stroke:#eae8e4; stroke-width:0.5; }
    .lc-label { fill:var(--text-muted); font-family:'Funkis A',sans-serif; font-size:9px; }
    .lc-area-views { fill:rgba(197,192,186,0.15); }
    .lc-area-sessions { fill:rgba(242,199,68,0.12); }
    .lc-area-conversions { fill:rgba(76,175,80,0.1); }
    .lc-line-views { fill:none; stroke:var(--grey-line); stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round; }
    .lc-line-sessions { fill:none; stroke:var(--yellow); stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round; }
    .lc-line-conversions { fill:none; stroke:var(--green); stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round; }

    .donut-container { display:flex; flex-direction:column; align-items:center; gap:1rem; }
    .donut-ring { position:relative; width:140px; height:140px; }
    .donut-svg { width:100%; height:100%; transform:rotate(-90deg); }
    .donut-center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .donut-total { font-family:'Kapra Neue','Funkis A',sans-serif; font-weight:900; font-size:1.6rem; line-height:1; }
    .donut-total-label { font-size:0.6rem; color:var(--text-muted); }
    .donut-legend { display:flex; flex-direction:column; gap:0.4rem; width:100%; }
    .legend-item { display:flex; align-items:center; gap:6px; font-size:0.75rem; }
    .legend-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .legend-name { color:var(--text-secondary); flex:1; }
    .legend-val { font-weight:700; font-variant-numeric:tabular-nums; }

    .device-row { display:flex; align-items:center; gap:1.5rem; }
    .device-ring { position:relative; width:80px; height:80px; flex-shrink:0; }
    .device-center { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:'Kapra Neue','Funkis A',sans-serif; font-weight:900; font-size:1rem; }
    .device-legend { display:flex; flex-direction:column; gap:0.5rem; }
    .device-legend-item { display:flex; align-items:center; gap:8px; font-size:0.8rem; }
    .device-legend-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .device-legend-val { font-weight:700; margin-left:auto; }
    .device-legend-pct { color:var(--text-muted); font-size:0.75rem; }

    .ref-list { display:flex; flex-direction:column; gap:0.6rem; }
    .ref-item { display:grid; grid-template-columns:16px 1fr auto 50px; align-items:center; gap:0.5rem; }
    .ref-rank { font-size:0.7rem; color:var(--text-muted); }
    .ref-name { font-size:0.8rem; }
    .ref-bar { height:6px; border-radius:3px; min-width:20px; }
    .ref-val { font-size:0.8rem; font-weight:700; text-align:right; }

    .bar-row { display:grid; grid-template-columns:120px 1fr 40px; align-items:center; gap:0.6rem; margin-bottom:0.55rem; }
    .bar-row:last-child { margin-bottom:0; }
    .bar-label { font-size:0.8rem; font-weight:500; }
    .bar-track { height:20px; background:var(--border); border-radius:4px; overflow:hidden; }
    .bar-fill { height:100%; border-radius:4px; transition:width 1.2s cubic-bezier(0.22,0.61,0.36,1); width:0; }
    .bar-val { font-size:0.8rem; font-weight:700; text-align:right; }
  </style>
  <link rel="icon" href="assets/grain-logomark.svg" type="image/svg+xml">
</head>
<body>
<script src="auth.js"></script>

  <nav class="nav">
    <a class="nav-brand" href="index.html">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="#1a1a1a"><path d="M20.5441 0.00360107V7.28361C20.5441 8.78497 20.0076 10.2611 19.0967 11.4493C18.2687 12.5294 17.2102 13.3755 15.9392 13.8795C14.8159 14.38 13.3542 14.9093 13.293 14.9273C13.293 14.8768 13.293 14.8012 13.293 14.7616C13.293 12.3854 13.293 9.99831 13.3074 7.62924C13.347 5.62022 14.1391 3.91363 15.6116 2.53108C16.3605 1.8182 17.2066 1.39335 18.067 1.01891L20.5441 0.00720147V0.00360107Z"/><path d="M4.00745 9.40759C4.5475 9.61642 5.10195 9.78563 5.6096 10.0017C6.29007 10.2897 7.00294 10.5345 7.6366 10.9018C9.37917 11.9171 10.5277 13.4544 11.0353 15.4275C11.2046 16.0827 11.2694 16.7488 11.2658 17.4257C11.2622 19.5463 11.2658 21.6634 11.2658 23.784C11.2658 23.8524 11.2658 23.9208 11.2658 24C10.5817 23.9532 9.94443 23.802 9.33237 23.55C7.09295 22.6319 5.50519 21.0513 4.5727 18.819C4.19466 17.9081 4.01105 16.9612 4.01105 15.9819C4.01105 13.8577 4.01105 11.7046 4.01105 9.58041C4.01105 9.53001 4.01105 9.4832 4.01105 9.40399L4.00745 9.40759Z"/><path d="M11.2658 10.2575C10.9346 10.1387 10.6106 10.0343 10.3226 9.9263C9.47647 9.57346 8.68079 9.27102 7.84911 8.89298C6.14975 7.97128 4.93283 6.55993 4.34597 4.70212C4.10115 3.92803 3.99314 3.06034 4.00034 2.25025C4.00394 1.58418 4.00034 0.918101 4.00034 0.248427C4.00034 0.187221 4.00034 0.0864096 4.00034 0C4.27756 0.108012 4.56559 0.212423 4.81762 0.316835C5.6601 0.662473 6.54219 0.972107 7.35227 1.38255C8.93282 2.17824 10.0453 3.44558 10.7222 5.08376C11.111 6.02347 11.2839 7.00998 11.2658 8.02889V10.2575Z"/><path d="M20.544 14.0882C20.5332 14.9559 20.5944 16.4357 20.4 17.5626C20.0579 19.118 19.2299 20.5365 18.1174 21.6706C16.9904 22.8192 15.6007 23.5536 14.0238 23.9065C13.7609 23.9641 13.5881 23.9929 13.2965 23.9929C13.2965 23.568 13.2965 23.1792 13.2965 22.7904C13.2965 22.0163 13.2677 21.199 13.4261 20.4321C13.8257 18.4951 14.8626 16.9937 16.4648 15.8596C17.2641 15.3591 17.8401 15.1467 18.5782 14.8479C19.1759 14.6031 19.9319 14.2826 20.5476 14.0918"/></svg>
    </a>
    <a class="nav-back" href="index.html">Web Statistics</a>
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="#9A9691" stroke-width="1.5"><path d="M6 3l5 5-5 5"/></svg>
    <span style="font-size:0.8rem;color:#1A1A1A" id="navCrumbName"></span>
    <div class="nav-right">
      <span class="nav-live"></span>
      <span class="nav-updated" id="navUpdated">Updated just now</span>
    </div>
  </nav>

  <header class="page-header">
    <div>
      <div class="header-date" id="headerDate"></div>
      <div class="header-sub-row">
        <div class="header-sub" id="headerSub">All time overview</div>
        <div class="header-url" id="headerUrl"></div>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn">
        <svg viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4.78.75V4.24M10.05.75V4.24M.82 6.51H14"/><rect x=".75" y="2.32" width="13.32" height="11.68" rx="2.25"/></svg>
        Pick a date
      </button>
      <a class="btn" id="viewSiteBtn" href="#" target="_blank">View site</a>
    </div>
  </header>

  <main class="dashboard">
    <section class="kpi-row" id="kpiRow"></section>

    <div class="grid-2-1">
      <section class="card" id="trendCard">
        <div class="card-title-row">
          <h2 class="card-title">Visitor Trend</h2>
          <div class="chart-legend">
            <span class="chart-legend-item"><span class="chart-legend-dot" style="background:var(--grey-line)"></span>Views</span>
            <span class="chart-legend-item"><span class="chart-legend-dot" style="background:var(--yellow)"></span>Sessions</span>
            <span class="chart-legend-item"><span class="chart-legend-dot" style="background:var(--green)"></span>Conversions</span>
          </div>
        </div>
        <svg class="lc-svg" id="lineChart" viewBox="0 0 600 200" preserveAspectRatio="xMidYMid meet"></svg>
      </section>
      <section class="card" id="pageCard">
        <h2 class="card-title">Top Pages</h2>
        <div class="donut-container">
          <div class="donut-ring">
            <svg class="donut-svg" viewBox="0 0 36 36" id="pageDonut"></svg>
            <div class="donut-center">
              <span class="donut-total" id="pageTotal">0</span>
              <span class="donut-total-label">views</span>
            </div>
          </div>
          <div class="donut-legend" id="pageLegend"></div>
        </div>
      </section>
    </div>

    <div class="grid-3">
      <section class="card" id="deviceCard">
        <h2 class="card-title">Devices</h2>
        <div class="device-row" id="deviceContent"></div>
      </section>
      <section class="card" id="refCard">
        <h2 class="card-title">Where They Came From</h2>
        <div class="ref-list" id="refList"></div>
      </section>
      <section class="card" id="geoCard">
        <h2 class="card-title">Top Countries</h2>
        <div id="geoChart"></div>
      </section>
    </div>

    <div class="grid-2">
      <section class="card" id="browserCard">
        <h2 class="card-title">Browser</h2>
        <div id="browserChart"></div>
      </section>
      <section class="card" id="osCard">
        <h2 class="card-title">Operating System</h2>
        <div id="osChart"></div>
      </section>
    </div>
  </main>

  <script>
    const ns='http://www.w3.org/2000/svg';
    const svgEl=(tag,attrs)=>{const e=document.createElementNS(ns,tag);for(const[k,v]of Object.entries(attrs||{}))e.setAttribute(k,v);return e;};
    function countUp(el,target,suffix,dur=1000){const s=performance.now();(function t(now){const p=Math.min((now-s)/dur,1);const ease=1-Math.pow(1-p,3);el.textContent=Math.round(target*ease).toLocaleString()+suffix;if(p<1)requestAnimationFrame(t);})(performance.now());}
    function seed(s){return function(){s=Math.sin(s)*10000;return s-Math.floor(s);};}

    // ─── Read URL params ───
    const params = new URLSearchParams(location.search);
    const siteUrl = params.get('url') || 'https://example.com';
    const siteName = params.get('name') || 'Website';

    // Seed random from URL for consistent data
    const rng = seed(Array.from(siteUrl).reduce((a,c)=>a+c.charCodeAt(0),0));
    const ri = (min,max) => Math.floor(rng()*(max-min+1))+min;

    // ─── Populate header ───
    document.title = `${siteName} Stats — Grain`;
    document.getElementById('navCrumbName').textContent = siteName;
    const now = new Date();
    const twoWeeksAgo = new Date(now); twoWeeksAgo.setDate(now.getDate() - 14);
    const fmtDate = d => `${d.getDate()} ${d.toLocaleString('en-GB',{month:'short'}).toUpperCase()} ${d.getFullYear()}`;
    document.getElementById('headerDate').textContent = `${fmtDate(twoWeeksAgo)} – ${fmtDate(now)}`;
    document.getElementById('headerSub').textContent = `${siteName} — All time overview`;
    document.getElementById('headerUrl').innerHTML = `<a href="${siteUrl}" target="_blank">${siteUrl}</a>`;
    document.getElementById('viewSiteBtn').href = siteUrl;
    document.getElementById('navUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString('en-SG',{hour:'2-digit',minute:'2-digit'});

    // ─── Generate data ───
    const totalViews = ri(800,12000);
    const totalSessions = ri(Math.floor(totalViews*0.3),Math.floor(totalViews*0.7));
    const totalConversions = ri(Math.floor(totalSessions*0.05),Math.floor(totalSessions*0.3));
    const bounceRate = ri(30,70);
    const avgTime = `${ri(0,3)}m ${ri(10,59)}s`;

    const KPI=[
      {label:'Page Views',value:totalViews,suffix:''},
      {label:'Sessions',value:totalSessions,suffix:''},
      {label:'Conversions',value:totalConversions,suffix:''},
      {label:'Bounce Rate',value:bounceRate,suffix:'%',highlight:true},
      {label:'Avg. Time',value:null,static:avgTime},
    ];

    // Daily data (14 days)
    const dailyV=[],dailyS=[],dailyC=[];
    for(let i=0;i<14;i++){const v=ri(Math.floor(totalViews/20),Math.floor(totalViews/8));dailyV.push(v);dailyS.push(ri(Math.floor(v*0.3),Math.floor(v*0.6)));dailyC.push(ri(Math.floor(v*0.02),Math.floor(v*0.15)));}
    const dayLabels=[];for(let i=13;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);dayLabels.push(d.toLocaleDateString('en-GB',{day:'numeric',month:'short'}));}

    const hostname=siteUrl.replace(/^https?:\/\//,'').replace(/\/.*$/,'');
    const PAGES=[
      {name:'/',count:ri(200,totalViews/2),color:'var(--yellow)'},
      {name:'/about',count:ri(50,totalViews/5),color:'var(--orange)'},
      {name:'/menu',count:ri(30,totalViews/6),color:'var(--green)'},
      {name:'/contact',count:ri(20,totalViews/8),color:'var(--blue)'},
      {name:'/blog',count:ri(10,totalViews/10),color:'var(--purple)'},
    ];

    const DEVICES=[
      {name:'Mobile',count:ri(Math.floor(totalViews*0.4),Math.floor(totalViews*0.7)),color:'var(--yellow)'},
      {name:'Desktop',count:ri(Math.floor(totalViews*0.2),Math.floor(totalViews*0.5)),color:'var(--grey-line)'},
    ];

    const REFS=[
      {name:'direct',count:ri(200,totalViews/2),color:'var(--yellow)'},
      {name:'google.com',count:ri(100,totalViews/3),color:'var(--yellow)'},
      {name:'instagram.com',count:ri(50,totalViews/5),color:'var(--yellow)'},
      {name:hostname,count:ri(20,totalViews/8),color:'#e8dbb0'},
      {name:'facebook.com',count:ri(10,totalViews/10),color:'#e5e2dd'},
    ].sort((a,b)=>b.count-a.count);

    const COUNTRIES=[
      {name:'Singapore',pct:ri(40,70),color:'var(--yellow)'},
      {name:'Malaysia',pct:ri(8,20),color:'var(--orange)'},
      {name:'Indonesia',pct:ri(3,12),color:'var(--green)'},
      {name:'United States',pct:ri(2,8),color:'var(--blue)'},
      {name:'Others',pct:ri(2,10),color:'var(--grey-line)'},
    ];

    const BROWSERS=[
      {name:'Chrome',pct:ri(45,65),color:'var(--yellow)'},
      {name:'Safari',pct:ri(20,35),color:'var(--blue)'},
      {name:'Firefox',pct:ri(3,10),color:'var(--orange)'},
      {name:'Edge',pct:ri(2,8),color:'var(--green)'},
    ];

    const OS_DATA=[
      {name:'iOS',pct:ri(30,50),color:'var(--grey-line)'},
      {name:'Android',pct:ri(15,30),color:'var(--green)'},
      {name:'Windows',pct:ri(10,25),color:'var(--blue)'},
      {name:'macOS',pct:ri(8,20),color:'var(--purple)'},
    ];

    // ─── RENDER KPIs ───
    (function(){
      const row=document.getElementById('kpiRow');
      KPI.forEach((k,i)=>{
        const d=document.createElement('div');
        d.className='kpi-card'+(k.highlight?' highlight':'');
        d.style.animationDelay=`${i*0.06}s`;
        if(k.value!==null) d.innerHTML=`<span class="kpi-label">${k.label}</span><span class="kpi-value" data-count="${k.value}" data-suffix="${k.suffix}">0</span>`;
        else d.innerHTML=`<span class="kpi-label">${k.label}</span><span class="kpi-value">${k.static}</span>`;
        row.appendChild(d);
      });
    })();

    // ─── LINE CHART ───
    (function(){
      const svg=document.getElementById('lineChart');
      const pad={t:10,r:10,b:24,l:36},W=600-pad.l-pad.r,H=200-pad.t-pad.b;
      const allMax=Math.max(...dailyV)*1.15;
      const x=i=>pad.l+(i/(dailyV.length-1))*W;
      const y=v=>pad.t+H-(v/allMax)*H;
      for(let i=0;i<5;i++){const val=Math.round((i/4)*allMax);svg.appendChild(svgEl('line',{x1:pad.l,x2:600-pad.r,y1:y(val),y2:y(val),class:'lc-grid'}));const lbl=svgEl('text',{x:pad.l-6,y:y(val)+3,'text-anchor':'end',class:'lc-label'});lbl.textContent=val;svg.appendChild(lbl);}
      dayLabels.forEach((d,i)=>{if(i%3!==0&&i!==dayLabels.length-1)return;const lbl=svgEl('text',{x:x(i),y:200-4,'text-anchor':'middle',class:'lc-label'});lbl.textContent=d;svg.appendChild(lbl);});
      function makeLine(data,ac,lc){const pts=data.map((v,i)=>`${x(i)},${y(v)}`).join(' ');svg.appendChild(svgEl('polygon',{points:`${x(0)},${y(0)} ${pts} ${x(data.length-1)},${y(0)}`,class:ac}));svg.appendChild(svgEl('polyline',{points:pts,class:lc}));}
      makeLine(dailyV,'lc-area-views','lc-line-views');
      makeLine(dailyS,'lc-area-sessions','lc-line-sessions');
      makeLine(dailyC,'lc-area-conversions','lc-line-conversions');
    })();

    // ─── PAGE DONUT ───
    (function(){
      const svg=document.getElementById('pageDonut'),legend=document.getElementById('pageLegend');
      const R=15.915;let offset=0;const total=PAGES.reduce((s,r)=>s+r.count,0);
      document.getElementById('pageTotal').textContent=total.toLocaleString();
      PAGES.forEach(d=>{const circ=2*Math.PI*R;const dash=(d.count/total)*circ;svg.appendChild(svgEl('circle',{cx:18,cy:18,r:R,fill:'none',stroke:d.color,'stroke-width':4,'stroke-dasharray':`${dash} ${circ-dash}`,'stroke-dashoffset':-offset,'stroke-linecap':'round'}));offset+=dash;legend.innerHTML+=`<div class="legend-item"><span class="legend-dot" style="background:${d.color}"></span><span class="legend-name">${d.name}</span><span class="legend-val">${d.count.toLocaleString()}</span></div>`;});
    })();

    // ─── DEVICES ───
    (function(){
      const el=document.getElementById('deviceContent');const total=DEVICES.reduce((s,d)=>s+d.count,0);
      let svg=`<div class="device-ring"><svg class="donut-svg" viewBox="0 0 36 36">`;const R=15.915;let o=0;
      DEVICES.forEach(d=>{const c=2*Math.PI*R;const dash=(d.count/total)*c;svg+=`<circle cx="18" cy="18" r="${R}" fill="none" stroke="${d.color}" stroke-width="4" stroke-dasharray="${dash} ${c-dash}" stroke-dashoffset="${-o}"/>`;o+=dash;});
      svg+=`</svg><div class="device-center">${total.toLocaleString()}</div></div>`;
      let leg='<div class="device-legend">';DEVICES.forEach(d=>{leg+=`<div class="device-legend-item"><span class="device-legend-dot" style="background:${d.color}"></span><span>${d.name}</span><span class="device-legend-val">${d.count.toLocaleString()}</span><span class="device-legend-pct">(${Math.round(d.count/total*100)}%)</span></div>`;});leg+='</div>';
      el.innerHTML=svg+leg;
    })();

    // ─── REFERRERS ───
    (function(){
      const el=document.getElementById('refList');const max=REFS[0].count;
      REFS.forEach((r,i)=>{el.innerHTML+=`<div class="ref-item"><span class="ref-rank">${i+1}</span><span class="ref-name">${r.name}</span><div class="ref-bar" style="width:${Math.max((r.count/max)*100,8)}%;background:${r.color}"></div><span class="ref-val">${r.count.toLocaleString()}</span></div>`;});
    })();

    // ─── COUNTRIES ───
    (function(){
      const el=document.getElementById('geoChart');
      COUNTRIES.forEach(d=>{el.innerHTML+=`<div class="bar-row"><span class="bar-label">${d.name}</span><div class="bar-track"><div class="bar-fill" style="background:${d.color}" data-width="${d.pct}%"></div></div><span class="bar-val">${d.pct}%</span></div>`;});
    })();

    // ─── BROWSERS ───
    (function(){
      const el=document.getElementById('browserChart');
      BROWSERS.forEach(d=>{el.innerHTML+=`<div class="bar-row"><span class="bar-label">${d.name}</span><div class="bar-track"><div class="bar-fill" style="background:${d.color}" data-width="${d.pct}%"></div></div><span class="bar-val">${d.pct}%</span></div>`;});
    })();

    // ─── OS ───
    (function(){
      const el=document.getElementById('osChart');
      OS_DATA.forEach(d=>{el.innerHTML+=`<div class="bar-row"><span class="bar-label">${d.name}</span><div class="bar-track"><div class="bar-fill" style="background:${d.color}" data-width="${d.pct}%"></div></div><span class="bar-val">${d.pct}%</span></div>`;});
    })();

    // ─── SCROLL ANIMATIONS ───
    const io=new IntersectionObserver(entries=>{entries.forEach(e=>{if(!e.isIntersecting)return;e.target.classList.add('visible');io.unobserve(e.target);e.target.querySelectorAll('.bar-fill[data-width]').forEach(b=>{b.style.width=b.dataset.width;});const c=e.target.querySelector('.kpi-value[data-count]');if(c)countUp(c,+c.dataset.count,c.dataset.suffix||'');});},{threshold:0.12});
    document.querySelectorAll('.kpi-card,.card').forEach(el=>io.observe(el));
    document.querySelectorAll('.kpi-card').forEach((c,i)=>{c.style.animationDelay=`${i*0.06}s`;});
    document.querySelectorAll('.card').forEach((c,i)=>{c.style.animationDelay=`${i*0.04}s`;});
  </script>
</body>
</html>
